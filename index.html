<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
<title>نظام معهد القرآن الكريم - نسخة خفيفة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;font-family:'Tajawal',sans-serif;margin:0;padding:0;}
body{background:#f1f5f9;padding:12px;color:#0f172a;}
.container{max-width:1200px;margin:0 auto;}
.hidden{display:none;}
.btn{background:#064e3b;border:none;padding:10px 18px;border-radius:12px;color:white;font-weight:bold;font-size:0.9rem;cursor:pointer;margin:4px;display:inline-block;}
.btn-gold{background:#b45309;}
.btn-danger{background:#be123c;}
.btn-out{background:transparent;border:1px solid white;color:white;}
header{background:#064e3b;color:white;padding:12px;border-radius:16px;margin-bottom:16px;display:flex;justify-content:space-between;}
.student-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.student-card{background:white;border-radius:16px;padding:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.student-img{width:100%;height:150px;object-fit:cover;border-radius:12px;background:#e2e8f0;}
.abs-badge{background:#dcfce7;color:#166534;border-radius:20px;padding:2px 12px;font-size:0.75rem;}
input,select,textarea{width:100%;padding:10px;border-radius:12px;border:1px solid #cbd5e1;margin:6px 0;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;justify-content:center;align-items:center;z-index:1000;}
.modal-card{background:white;width:95%;max-width:550px;max-height:90vh;overflow:auto;border-radius:24px;padding:20px;}
.live-header{background:#fef9c3;padding:8px;text-align:center;border-radius:20px;margin-bottom:12px;font-weight:bold;}
@media print{
  .no-print{display:none;}
  .print-area{display:block;}
}
</style>
</head>
<body>
<div class="live-header no-print" id="liveClock"></div>

<!-- شاشة اختيار المسجد -->
<div id="mosqueScreen" class="container">
  <div style="text-align:center;margin-top:40px"><h1 style="color:#064e3b;">نظام معهد القرآن الكريم</h1><p>اختر المسجد</p></div>
  <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;"><button class="btn" onclick="setMosque('مسجد طارق بن زياد')">مسجد طارق بن زياد</button><button class="btn" onclick="setMosque('مسجد الحاجة مريم')">مسجد الحاجة مريم</button></div>
</div>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="container hidden">
  <div style="background:white;border-radius:24px;padding:24px;max-width:400px;margin:auto;">
    <h2 style="color:#064e3b;">تسجيل الدخول</h2>
    <div id="mosqueLabel"></div>
    <label>اسم المستخدم</label><input type="text" id="username">
    <label>كلمة المرور</label><input type="password" id="password">
    <button class="btn btn-block" style="width:100%;margin-top:16px;" onclick="doLogin()">دخول المشرفين</button>
    <hr><label>دخول ولي أمر</label>
    <select id="parentGroup"><option>مجموعة أهل القرآن</option><option>مجموعة الفتية</option><option>مجموعة الأشبال</option></select>
    <button class="btn btn-gold btn-block" style="width:100%;margin-top:8px;" onclick="parentLogin()">دخول ولي الأمر</button>
    <button class="btn btn-out" style="background:#e2e8f0;color:#1e293b;margin-top:12px;" onclick="location.reload()">← عودة</button>
  </div>
</div>

<!-- لوحة التحكم -->
<div id="dashboard" class="container hidden">
  <header><div><h2 id="userName"></h2><p id="curMosque"></p></div><button class="btn btn-out" onclick="location.reload()">خروج</button></header>
  <div id="actionButtons" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
  <div class="srch"><input type="search" id="search" placeholder="🔍 بحث بالاسم أو رقم الهاتف" oninput="renderStudents()"></div>
  <div id="statsMenu" class="hidden" style="display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;"></div>
  <h3 id="listTitle">قائمة الطلاب</h3>
  <div class="student-grid" id="studentsContainer"></div>
</div>

<!-- باقي النوافذ المنبثقة مختصرة -->
<div id="studentModal" class="modal hidden"><div class="modal-card"><h3 id="studentModalTitle">بيانات الطالب</h3><form id="studentForm"><input type="hidden" id="studentId"><label>الاسم</label><input id="sName" required><label>العمر</label><input id="sAge" type="number"><label>الهاتف</label><input id="sPhone" required><label>المجموعة</label><select id="sGroup"></select><label>الصورة (رابط أو اختيار ملف)</label><input type="file" id="sPhotoFile" accept="image/*"><div style="display:flex;gap:8px;margin-top:16px;"><button type="submit" class="btn">حفظ</button><button type="button" class="btn btn-danger" onclick="closeModal('studentModal')">إلغاء</button></div></form></div></div>

<div id="attModal" class="modal hidden"><div class="modal-card"><h3>تسجيل كشف الحضور</h3><div id="attList"></div><div style="display:flex;gap:8px;margin-top:16px;"><button class="btn" onclick="saveAttendance()">حفظ الكشف</button><button class="btn btn-danger" onclick="closeModal('attModal')">إلغاء</button></div></div></div>

<div id="historyModal" class="modal hidden"><div class="modal-card"><h3 id="historyTitle">سجل الطالب</h3><div id="historyList"></div><button class="btn btn-danger" onclick="closeModal('historyModal')">إغلاق</button></div></div>

<script>
// ------------------ الإعدادات ------------------
const GROUPS = ['مجموعة أهل القرآن','مجموعة الفتية','مجموعة الأشبال'];
const ACCOUNTS = [
  {user:'mohammed',pass:'mohammed1234',name:'الشيخ محمد أبو عصبة',role:'admin',group:null},
  {user:'yousef',pass:'yousef1234',name:'الشيخ يوسف',role:'teacher',group:'مجموعة أهل القرآن'},
  {user:'khalil',pass:'khalil1234',name:'الشيخ خليل',role:'teacher',group:'مجموعة الفتية'},
  {user:'asaad',pass:'asaad078028',name:'الشيخ أسعد',role:'teacher',group:'مجموعة الأشبال'}
];

let db = { mosque:'', user:null, students:[], reports:[] };
let currentAttGroup = '', currentAttReportId = null, attTempData = {};

// تحميل البيانات من localStorage
function loadLocalData(){
  let stored = localStorage.getItem('quran_system');
  if(stored) { let data = JSON.parse(stored); db.students = data.students || []; db.reports = data.reports || []; }
  else { db.students = []; db.reports = []; }
}
function saveLocalData(){
  localStorage.setItem('quran_system', JSON.stringify({ students:db.students, reports:db.reports }));
}

loadLocalData();

// مساعدات
function showModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
function setMosque(m){ db.mosque = m; document.getElementById('mosqueLabel').innerText = m; document.getElementById('mosqueScreen').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); }

function doLogin(){
  let u = document.getElementById('username').value.trim().toLowerCase();
  let p = document.getElementById('password').value.trim();
  let acc = ACCOUNTS.find(a=>a.user===u && a.pass===p);
  if(acc){ db.user = acc; showDashboard(); }
  else alert('خطأ في بيانات الدخول');
}
function parentLogin(){
  let g = document.getElementById('parentGroup').value;
  db.user = { role:'parent', name:'ولي أمر', group:g };
  showDashboard();
}

function showDashboard(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('userName').innerText = db.user.name;
  document.getElementById('curMosque').innerText = db.mosque;
  renderButtons();
  renderStudents();
  setInterval(()=>{ let d=new Date(); document.getElementById('liveClock').innerHTML = d.toLocaleDateString('ar-EG')+' '+d.toLocaleTimeString('ar-EG'); },1000);
}

function renderButtons(){
  let btnsDiv = document.getElementById('actionButtons'); btnsDiv.innerHTML='';
  if(db.user.role==='admin'){
    btnsDiv.innerHTML += `<button class="btn" onclick="openAddStudent()">➕ إضافة طالب</button>`;
    btnsDiv.innerHTML += `<button class="btn btn-gold" onclick="showArchive()">📋 أرشيف الكشوفات</button>`;
    btnsDiv.innerHTML += `<button class="btn btn-info" style="background:#0891b2;" onclick="showAbsenceStats()">📊 إحصائيات الغياب</button>`;
    btnsDiv.innerHTML += `<button class="btn btn-teal" style="background:#0d9488;" onclick="printAllStudents()">🖨️ طباعة الأسماء</button>`;
    document.getElementById('statsMenu').classList.remove('hidden');
    let statsDiv = document.getElementById('statsMenu'); statsDiv.innerHTML = `<div class="btn" onclick="renderStudents()">الكل (${db.students.filter(s=>s.mosque===db.mosque).length})</div>`;
    GROUPS.forEach(g=>{ let cnt=db.students.filter(s=>s.mosque===db.mosque && s.group===g).length; statsDiv.innerHTML += `<div class="btn" onclick="renderStudents('${g}')">${g} (${cnt})</div>`; });
  } else if(db.user.role==='teacher'){
    btnsDiv.innerHTML += `<button class="btn" onclick="openAttendanceSheet()">📝 تسجيل كشف اليوم</button>`;
    btnsDiv.innerHTML += `<button class="btn btn-gold" onclick="showArchive()">📋 كشوفاتي</button>`;
    btnsDiv.innerHTML += `<button class="btn" onclick="openAddStudent()">➕ إضافة طالب</button>`;
    btnsDiv.innerHTML += `<button class="btn btn-info" onclick="showAbsenceStats()">📊 إحصائيات الغياب</button>`;
    btnsDiv.innerHTML += `<button class="btn btn-teal" onclick="printAllStudents()">🖨️ طباعة الأسماء</button>`;
    document.getElementById('statsMenu').classList.add('hidden');
  } else if(db.user.role==='parent'){
    btnsDiv.innerHTML = `<button class="btn btn-gold" onclick="viewParentHistory()">👀 عرض سجل ابني</button>`;
    document.getElementById('statsMenu').classList.add('hidden');
  }
}

function renderStudents(filterGroup=null){
  let search = document.getElementById('search').value.trim().toLowerCase();
  let list = db.students.filter(s=>s.mosque===db.mosque);
  if(db.user.role==='teacher') list = list.filter(s=>s.group===db.user.group);
  else if(db.user.role==='parent') list = list.filter(s=>s.group===db.user.group);
  if(filterGroup && db.user.role==='admin') list = list.filter(s=>s.group===filterGroup);
  if(search) list = list.filter(s=>s.name.toLowerCase().includes(search) || (s.phone && s.phone.includes(search)));
  
  let container = document.getElementById('studentsContainer'); container.innerHTML='';
  if(list.length===0) { container.innerHTML='<p>لا يوجد طلاب</p>'; return; }
  list.forEach(s=>{
    let absCount = db.reports.filter(r=>r.mosque===db.mosque && r.data && r.data[s.id] && r.data[s.id].status==='absent').length;
    let canEdit = (db.user.role==='admin') || (db.user.role==='teacher' && db.user.group===s.group);
    let photoHtml = s.photo ? `<img src="${s.photo}" class="student-img" onclick="viewPhoto('${s.photo}')">` : `<div class="student-img" style="background:#e2e8f0;display:flex;align-items:center;justify-content:center;">📷</div>`;
    container.innerHTML += `<div class="student-card">${photoHtml}<div><div style="display:flex;justify-content:space-between;"><b>${s.name}</b><span class="abs-badge">غياب:${absCount}</span></div><div>${s.age} سنة | ${s.group}</div><div>📞 ${s.phone}</div>${canEdit ? `<div style="margin-top:8px;"><button class="btn" style="background:#3b82f6;" onclick="editStudent('${s.id}')">تعديل</button> <button class="btn btn-danger" onclick="deleteStudent('${s.id}')">حذف</button></div>` : `<button class="btn btn-gold" onclick="showStudentHistory('${s.id}')">عرض السجل</button>`}</div></div>`;
  });
}

// إدارة الطلاب
function openAddStudent(){ editStudent(null); }
function editStudent(id){
  let form = document.getElementById('studentForm'); form.reset();
  document.getElementById('studentId').value = id || '';
  let sel = document.getElementById('sGroup'); sel.innerHTML = GROUPS.map(g=>`<option value="${g}">${g}</option>`).join('');
  if(id){
    let s = db.students.find(x=>x.id==id);
    if(s){ document.getElementById('sName').value=s.name; document.getElementById('sAge').value=s.age; document.getElementById('sPhone').value=s.phone; document.getElementById('sGroup').value=s.group; }
    document.getElementById('studentModalTitle').innerText = 'تعديل طالب';
  } else { document.getElementById('studentModalTitle').innerText = 'إضافة طالب جديد'; }
  showModal('studentModal');
}
document.getElementById('studentForm').onsubmit = function(e){
  e.preventDefault();
  let id = document.getElementById('studentId').value;
  let name = document.getElementById('sName').value.trim();
  let age = parseInt(document.getElementById('sAge').value);
  let phone = document.getElementById('sPhone').value.trim();
  let group = document.getElementById('sGroup').value;
  let photo = ''; // يمكن إضافة صورة
  let fileInput = document.getElementById('sPhotoFile');
  if(fileInput.files && fileInput.files[0]){
    let reader = new FileReader();
    reader.onload = ev=>{ saveStudent(id, name, age, phone, group, ev.target.result); };
    reader.readAsDataURL(fileInput.files[0]);
  } else { saveStudent(id, name, age, phone, group, photo); }
};
function saveStudent(id,name,age,phone,group,photo){
  if(id){
    let idx = db.students.findIndex(s=>s.id==id);
    if(idx!==-1) db.students[idx] = {...db.students[idx], name, age, phone, group, photo};
  } else {
    let newId = Date.now().toString();
    db.students.push({ id:newId, mosque:db.mosque, name, age, phone, group, photo, history:[] });
  }
  saveLocalData();
  closeModal('studentModal');
  renderStudents();
}
function deleteStudent(id){
  if(confirm('حذف الطالب نهائياً؟')){ db.students = db.students.filter(s=>s.id!=id); saveLocalData(); renderStudents(); }
}

// عرض سجل الطالب
function showStudentHistory(id){
  let s = db.students.find(x=>x.id==id);
  if(!s) return;
  document.getElementById('historyTitle').innerText = `سجل ${s.name}`;
  let listDiv = document.getElementById('historyList'); listDiv.innerHTML='';
  let reports = db.reports.filter(r=>r.mosque===db.mosque && r.data && r.data[id]).sort((a,b)=>b.id - a.id);
  if(reports.length===0) listDiv.innerHTML='<p>لا توجد سجلات</p>';
  else reports.forEach(r=>{
    let att = r.data[id];
    let statusText = att.status==='present'?'حاضر':att.status==='absent_excused'?'غائب بعذر':'غائب';
    let extra = '';
    if(att.status==='present'){
      extra = `<p><b>سمع:</b> ${att.today||'-'}</p><p><b>التقييم:</b> ${att.rating||'-'}</p><p><b>المطلوب:</b> ${att.required||'-'}</p>`;
      if(att.revision && att.revision.length) extra+=`<p><b>مراجعة:</b> ${att.revision.join('، ')}</p>`;
    }
    listDiv.innerHTML += `<div style="border-bottom:1px solid #ccc;padding:8px;"><div><b>${r.date}</b> - ${statusText}</div>${extra}</div>`;
  });
  showModal('historyModal');
}
function viewParentHistory(){
  // لولي الأمر: نعرض سجل أبنائه (كل الطلاب في مجموعته)
  let students = db.students.filter(s=>s.mosque===db.mosque && s.group===db.user.group);
  if(students.length===0) alert('لا يوجد أبناء مسجلون');
  else if(students.length===1) showStudentHistory(students[0].id);
  else {
    let msg = 'اختر الابن:\n';
    students.forEach((s,i)=>msg+=`${i+1}- ${s.name}\n`);
    let idx = prompt(msg);
    if(idx && students[parseInt(idx)-1]) showStudentHistory(students[parseInt(idx)-1].id);
  }
}

// كشف الحضور
function openAttendanceSheet(reportId=null){
  currentAttReportId = reportId;
  let group = db.user.role==='teacher' ? db.user.group : ( reportId ? db.reports.find(r=>r.id==reportId)?.group : null );
  if(!group && db.user.role!=='teacher') group = prompt('أدخل اسم المجموعة', GROUPS[0]);
  if(!group) return;
  currentAttGroup = group;
  let students = db.students.filter(s=>s.mosque===db.mosque && s.group===currentAttGroup);
  if(students.length===0) { alert('لا يوجد طلاب في هذه المجموعة'); return; }
  let existing = reportId ? db.reports.find(r=>r.id==reportId) : null;
  let existingData = existing ? existing.data : {};
  let container = document.getElementById('attList'); container.innerHTML='';
  attTempData = {};
  students.forEach(s=>{
    let old = existingData[s.id] || { status:'present', today:'', required:'', rating:'ممتاز', revision:[] };
    attTempData[s.id] = {...old};
    let statusOptions = `<select onchange="attTempData['${s.id}'].status=this.value"><option value="present" ${old.status==='present'?'selected':''}>حاضر</option><option value="absent" ${old.status==='absent'?'selected':''}>غائب</option><option value="absent_excused" ${old.status==='absent_excused'?'selected':''}>غائب بعذر</option></select>`;
    let revHtml = `<details><summary>📚 مراجعة أجزاء</summary><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:4px;">`;
    for(let i=1;i<=30;i++){ let juz=`الجزء ${i}`; revHtml+=`<label><input type="checkbox" value="${juz}" ${(old.revision||[]).includes(juz)?'checked':''} onchange="toggleRevision('${s.id}',this)"> ${juz}</label>`; }
    revHtml+=`</div></details>`;
    container.innerHTML += `<div style="border:1px solid #ccc;border-radius:16px;padding:12px;margin-bottom:12px;"><div><b>${s.name}</b> ${statusOptions}</div><div><label>ماذا سمع اليوم:</label><input type="text" value="${old.today||''}" oninput="attTempData['${s.id}'].today=this.value"></div><div><label>التقييم:</label><select oninput="attTempData['${s.id}'].rating=this.value"><option ${old.rating==='ممتاز'?'selected':''}>ممتاز</option><option ${old.rating==='جيد جداً'?'selected':''}>جيد جداً</option><option ${old.rating==='جيد'?'selected':''}>جيد</option><option ${old.rating==='يحتاج تحسين'?'selected':''}>يحتاج تحسين</option></select></div><div><label>المطلوب للمرة القادمة:</label><input type="text" value="${old.required||''}" oninput="attTempData['${s.id}'].required=this.value"></div>${revHtml}</div>`;
  });
  showModal('attModal');
}
function toggleRevision(sid, cb){
  let rev = attTempData[sid].revision || [];
  if(cb.checked){ if(!rev.includes(cb.value)) rev.push(cb.value); }
  else { let idx = rev.indexOf(cb.value); if(idx!==-1) rev.splice(idx,1); }
  attTempData[sid].revision = rev;
}
function saveAttendance(){
  let now = new Date();
  let reportDate = now.toLocaleDateString('ar-EG');
  let teacher = db.user.role==='admin' ? 'المدير العام' : db.user.name;
  let newReport = {
    id: currentAttReportId || Date.now().toString(),
    mosque: db.mosque,
    group: currentAttGroup,
    teacher: teacher,
    date: reportDate,
    time: now.toLocaleTimeString('ar-EG'),
    data: JSON.parse(JSON.stringify(attTempData))
  };
  if(currentAttReportId){
    let idx = db.reports.findIndex(r=>r.id==currentAttReportId);
    if(idx!==-1) db.reports[idx] = newReport;
    else db.reports.push(newReport);
  } else {
    db.reports.push(newReport);
  }
  // تحديث سجل الطالب (history)
  for(let sid in attTempData){
    let student = db.students.find(s=>s.id==sid);
    if(student){
      if(!student.history) student.history = [];
      // إزالة أي سجل سابق لهذا التقرير ثم إضافة الجديد
      student.history = student.history.filter(h=>h.reportId !== newReport.id);
      student.history.unshift({ reportId:newReport.id, date:reportDate, ...attTempData[sid] });
    }
  }
  saveLocalData();
  alert('تم حفظ الكشف');
  closeModal('attModal');
  renderStudents();
}

// أرشيف الكشوفات
function showArchive(){
  let list = db.reports.filter(r=>r.mosque===db.mosque);
  if(db.user.role==='teacher') list = list.filter(r=>r.group===db.user.group);
  if(list.length===0){ alert('لا توجد كشوفات'); return; }
  let msg = 'اختر الكشف:\n';
  list.forEach((r,i)=>msg+=`${i+1}- ${r.group} - ${r.date} (${r.teacher})\n`);
  let idx = prompt(msg);
  let rep = list[parseInt(idx)-1];
  if(rep) { if(confirm('عرض الكشف؟')) showReport(rep); if(confirm('هل تريد تعديل هذا الكشف؟')) openAttendanceSheet(rep.id); }
}
function showReport(rep){
  let students = db.students.filter(s=>s.mosque===db.mosque);
  let html = `<div style="background:white;border-radius:16px;padding:16px;"><h3>كشف ${rep.group} - ${rep.date}</h3><table border="1" style="width:100%;border-collapse:collapse;"><thead><tr><th>الطالب</th><th>الحالة</th><th>سمع</th><th>التقييم</th><th>المطلوب</th></tr></thead><tbody>`;
  for(let sid in rep.data){
    let s = students.find(s=>s.id==sid);
    let att = rep.data[sid];
    html+=`<tr><td>${s?s.name:'محذوف'}</td><td>${att.status==='present'?'حاضر':att.status==='absent_excused'?'غائب بعذر':'غائب'}</td><td>${att.today||'-'}</td><td>${att.rating||'-'}</td><td>${att.required||'-'}</td></tr>`;
  }
  html+=`</tbody></table><button class="btn btn-gold" onclick="printReport('${rep.id}')">🖨️ طباعة</button></div>`;
  let win = window.open(); win.document.write(`<html><head><meta charset="UTF-8"><title>كشف ${rep.group}</title><style>body{font-family:Tajawal;padding:20px;direction:rtl;} table{border-collapse:collapse;width:100%} th,td{border:1px solid black;padding:8px;text-align:right;}</style></head><body>${html}</body></html>`);
  win.print();
}
function printReport(reportId){
  let rep = db.reports.find(r=>r.id==reportId);
  if(rep) showReport(rep);
}
function printAllStudents(){
  let students = db.students.filter(s=>s.mosque===db.mosque);
  if(db.user.role==='teacher') students = students.filter(s=>s.group===db.user.group);
  let html = `<h2>قائمة الطلاب - ${db.mosque}</h2><table border="1"><thead><tr><th>#</th><th>الاسم</th><th>العمر</th><th>الهاتف</th><th>المجموعة</th></tr></thead><tbody>`;
  students.forEach((s,i)=>{ html+=`<tr><td>${i+1}</td><td>${s.name}</td><td>${s.age}</td><td>${s.phone}</td><td>${s.group}</td></tr>`; });
  html+=`</tbody></table>`;
  let win = window.open(); win.document.write(`<html><head><meta charset="UTF-8"><title>كشف الأسماء</title><style>body{font-family:Tajawal;direction:rtl;padding:20px} table{border-collapse:collapse;} th,td{border:1px solid black;padding:6px;}</style></head><body>${html}</body></html>`);
  win.print();
}

// إحصائيات الغياب المبسطة
function showAbsenceStats(){
  let students = db.students.filter(s=>s.mosque===db.mosque);
  if(db.user.role==='teacher') students = students.filter(s=>s.group===db.user.group);
  let stats = students.map(s=>{
    let abs = db.reports.filter(r=>r.mosque===db.mosque && r.data && r.data[s.id] && r.data[s.id].status==='absent').length;
    let exc = db.reports.filter(r=>r.mosque===db.mosque && r.data && r.data[s.id] && r.data[s.id].status==='absent_excused').length;
    let pres = db.reports.filter(r=>r.mosque===db.mosque && r.data && r.data[s.id] && r.data[s.id].status==='present').length;
    let total = abs+exc+pres;
    let pct = total ? Math.round(((pres+exc)/total)*100) : 100;
    return { name:s.name, group:s.group, abs, exc, pres, pct };
  }).sort((a,b)=>b.abs - a.abs);
  let html = `<h3>إحصائيات الغياب</h3><table border="1" style="width:100%"><thead><tr><th>الطالب</th><th>المجموعة</th><th>غياب</th><th>بعذر</th><th>حضور</th><th>نسبة الحضور</th></tr></thead><tbody>`;
  stats.forEach(s=>{ html+=`<tr><td>${s.name}</td><td>${s.group}</td><td>${s.abs}</td><td>${s.exc}</td><td>${s.pres}</td><td>${s.pct}%</td></tr>`; });
  html+=`</tbody></table><button class="btn btn-gold" onclick="printStats()">🖨️ طباعة</button>`;
  let win = window.open(); win.document.write(`<html><head><meta charset="UTF-8"><title>إحصائيات الغياب</title><style>body{font-family:Tajawal;padding:20px;direction:rtl} table{border-collapse:collapse;} th,td{border:1px solid black;padding:6px;}</style></head><body>${html}</body></html>`);
  win.print();
}
function printStats(){ showAbsenceStats(); }
