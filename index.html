<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلاب دار القرآن</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; direction: rtl; padding: 20px; }
.card { border:1px solid #ccc; padding:10px; margin:10px; border-radius:10px; display:flex; align-items:center; gap:10px;}
img { width:50px; height:50px; border-radius:50%; object-fit:cover;}
input { display:block; margin:5px 0; padding:5px; width:200px;}
button { padding:8px 15px; }
</style>

</head>
<body>

<h2>إضافة طالب</h2>

<input id="name" placeholder="الاسم">
<input id="age" placeholder="العمر">
<input id="phone" placeholder="الهاتف">
<input id="group" placeholder="الحلقة">
<input id="mosque" placeholder="المسجد">
<input id="notes" placeholder="ملاحظات">
<input type="file" id="photo">

<button onclick="saveStudent()">حفظ</button>

<hr>

<h2>الطلاب</h2>
<div id="students"></div>

<script>

const supabaseClient = supabase.createClient(
  "https://fgofdlkbuyzazmtaoxmc.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnb2ZkbGtidXl6YXptdGFveG1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1ODUwNjcsImV4cCI6MjA5MjE2MTA2N30.pnF7johXrd8Ns7EG09p-zyff9-7SVnNoGcFFFgK_XzA"
);

// رفع الصورة
async function uploadImage(file) {
  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabaseClient.storage
    .from('students')
    .upload(fileName, file);

  if (error) {
    alert("خطأ في رفع الصورة");
    console.error(error);
    return null;
  }

  const { data } = supabaseClient.storage
    .from('students')
    .getPublicUrl(fileName);

  return data.publicUrl;
}

// حفظ الطالب
async function saveStudent() {
  const file = document.getElementById('photo').files[0];
  let imageUrl = null;

  if (file) {
    imageUrl = await uploadImage(file);
  }

  const student = {
    name: document.getElementById('name').value,
    age: document.getElementById('age').value,
    phone: document.getElementById('phone').value,
    group_name: document.getElementById('group').value,
    mosque: document.getElementById('mosque').value,
    notes: document.getElementById('notes').value,
    photo: imageUrl
  };

  const { error } = await supabaseClient
    .from('students')
    .insert([student]);

  if (error) {
    console.error(error);
    alert("خطأ بالحفظ");
  } else {
    alert("تم الحفظ ✅");
    loadStudents();
  }
}

// تحميل الطلاب
async function loadStudents() {
  const { data, error } = await supabaseClient
    .from('students')
    .select('id,name,age,phone,notes,mosque,group_name,photo');

  if (error) {
    console.error("Supabase error:", error);
    alert("خطأ في تحميل الطلاب");
    return;
  }

  const container = document.getElementById('students');
  container.innerHTML = "";

  data.forEach(s => {
    container.innerHTML += `
      <div class="card">
        <img src="${s.photo || ''}">
        <div>
          <b>${s.name}</b><br>
          العمر: ${s.age}<br>
          الحلقة: ${s.group_name}<br>
          الهاتف: ${s.phone}
        </div>
      </div>
    `;
  });
}

// تشغيل أولي
loadStudents();

</script>

</body>
</html>
